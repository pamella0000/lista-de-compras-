<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <!-- ✅ VIEWPORT CORRIGIDO (REMOVIDO DUPLICADO) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">

    <title>Minha Lista de Compras - Lista compartilhada acessível</title>

    <link rel="stylesheet" href="src/index.css">

    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Manifest PWA -->
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#EA3788">
    <meta name="description" content="Aplicativo de lista de compras compartilhada com recursos de acessibilidade para todos os públicos">
</head>

<body>

    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <!-- ACESSIBILIDADE -->
    <div class="accessibility-menu">
        <button id="accessibilityBtn" class="accessibility-btn" aria-expanded="false">
            <i class="fas fa-universal-access"></i>
            <span>Acessibilidade</span>
        </button>

        <div id="accessibilityPanel" hidden>
            <button id="aumentarFonte">Aumentar Fonte</button>
            <button id="diminuirFonte">Diminuir Fonte</button>
            <button id="altoContraste">Alto Contraste</button>
            <button id="leitorTela">Modo Leitor</button>
            <button id="modoMercadoBtn">Modo Mercado</button>
            <button id="resetAcessibilidade">Resetar</button>
        </div>
    </div>

    <!-- FAB -->
    <button id="fabBtn"><i class="fas fa-plus"></i></button>

    <div class="app-container" id="main-content">

        <header>
            <h1>Lista de Compras</h1>
            <button id="modoMercadoHeader">Mercado</button>
            <button id="logoutBtn">Sair</button>
        </header>

        <!-- STATS -->
        <div>
            <span id="totalItens">0</span>
            <span id="itensComprados">0</span>
            <span id="itensPendentes">0</span>
            <span id="valorTotal">R$ 0,00</span>
        </div>

        <!-- LISTA -->
        <div>
            <button id="selecionarMultiplosBtn">Selecionar</button>
            <button id="limparCompradosBtn">Limpar comprados</button>
            <button id="limparListaBtn">Limpar tudo</button>

            <div id="bulkActionsBar" hidden>
                <span id="selectedCount">0</span>
                <button id="bulkDeleteBtn">Excluir</button>
                <button id="bulkCompleteBtn">Marcar comprados</button>
                <button id="bulkCancelBtn">Cancelar</button>
            </div>

            <ul id="lista"></ul>
        </div>

        <!-- ADD ITEM -->
        <div class="autocomplete-wrapper">
            <input type="text" id="item" placeholder="Produto...">
            <div id="sugestoesList" hidden></div>
        </div>

        <input type="text" id="quantidade" value="1">
        <input type="number" id="preco">

        <button id="adicionarBtn">Adicionar</button>

    </div>

    <div id="undoToast" hidden>
        <span id="undoMessage"></span>
        <button id="undoButton">DESFAZER</button>
    </div>

    <div id="liveRegion" aria-live="polite"></div>

    <script type="module" src="app.js"></script>

</body>
</html>
