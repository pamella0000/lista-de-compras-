<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Minha Lista de Compras</title>
    <link rel="stylesheet" href="src/index.css">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Manifest PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EA3788">
</head>

<body>
    <div class="app-container fade-in-up">
        <!-- Cabeçalho -->
        <header class="header">
            <div class="header-content">
                <div class="logo-area">
                    <i class="fas fa-basket-shopping"></i>
                    <h1 class="titulo">Lista de Compras</h1>
                </div>
                <button id="logoutBtn" class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </button>
            </div>
            <p class="subtitulo">Compartilhada em tempo real</p>
        </header>

        <!-- Barra de estatísticas aprimorada -->
        <div class="stats-bar">
            <div class="stat-item">
                <i class="fas fa-list-ul"></i>
                <span id="totalItens">0</span>
                <small>itens</small>
            </div>
            <div class="stat-item">
                <i class="fas fa-check-circle"></i>
                <span id="itensComprados">0</span>
                <small>comprados</small>
            </div>
            <div class="stat-item">
                <i class="fas fa-clock"></i>
                <span id="itensPendentes">0</span>
                <small>pendentes</small>
            </div>
            <div class="stat-item destaque">
                <i class="fas fa-dollar-sign"></i>
                <span id="valorTotal">R$ 0,00</span>
                <small>estimado</small>
            </div>
        </div>

        <!-- Área da lista -->
        <div class="list-wrapper">
            <div class="list-header">
                <h3><i class="fas fa-shopping-cart"></i> Meus itens</h3>
                <div class="header-buttons">
                    <button id="limparCompradosBtn" class="btn-clear" onclick="limparComprados()">
                        <i class="fas fa-check-double"></i>
                        <span>Limpar comprados</span>
                    </button>
                    <button id="limparListaBtn" class="btn-clear danger" onclick="limparLista()">
                        <i class="fas fa-trash-alt"></i>
                        <span>Limpar tudo</span>
                    </button>
                </div>
            </div>

            <ul id="lista" class="shopping-list">
                <li class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <p>Sua lista está vazia</p>
                    <small>Adicione itens abaixo</small>
                </li>
            </ul>
        </div>

        <!-- Área de adição de itens com preço -->
        <div class="add-item-container">
            <div class="add-item-wrapper">
                <div class="input-icon">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <input type="text" id="item" placeholder="Ex: Arroz, Leite, Café..." autocomplete="off">
                <div class="price-input-wrapper">
                    <span class="price-currency">R$</span>
                    <input type="number" id="preco" placeholder="Preço" step="0.01" min="0">
                </div>
                <button id="adicionarBtn" class="btn-add" onclick="adicionarItem()">
                    <i class="fas fa-plus"></i>
                    <span>Adicionar</span>
                </button>
            </div>
            <p class="dica">💡 Dica: Adicione o preço médio do produto para estimar o gasto total</p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
