<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login | Lista Compartilhada Acessível</title>
    <link rel="stylesheet" href="src/css/login.css">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EA3788">
    <meta name="description" content="Login para lista de compras compartilhada com recursos de acessibilidade">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
</head>

<body>
    <!-- Skip to content -->
    <a href="#main-login" class="skip-link">Pular para o conteúdo principal</a>
    
    <!-- Botão de acessibilidade -->
    <div class="accessibility-menu">
        <button id="accessibilityBtn" class="accessibility-btn" aria-label="Abrir menu de acessibilidade" aria-expanded="false">
            <i class="fas fa-universal-access"></i>
            <span class="btn-text">Acessibilidade</span>
        </button>
        <div id="accessibilityPanel" class="accessibility-panel" hidden>
            <h3>Ajustes de Acessibilidade</h3>
            <button id="aumentarFonte" aria-label="Aumentar tamanho da fonte">
                <i class="fas fa-text-height"></i> Aumentar Fonte
            </button>
            <button id="diminuirFonte" aria-label="Diminuir tamanho da fonte">
                <i class="fas fa-text-height"></i> Diminuir Fonte
            </button>
            <button id="altoContraste" aria-label="Ativar alto contraste">
                <i class="fas fa-adjust"></i> Alto Contraste
            </button>
            <button id="leitorTela" aria-label="Modo para leitor de tela">
                <i class="fas fa-eye"></i> Modo Leitor
            </button>
            <button id="resetAcessibilidade" aria-label="Resetar configurações">
                <i class="fas fa-undo-alt"></i> Resetar
            </button>
        </div>
    </div>

    <div class="container fade-in-up" id="main-login" role="main">
        <div class="icon-wrapper">
            <i class="fas fa-basket-shopping" aria-hidden="true"></i>
        </div>

        <h2 class="titulo">Bem-vindo(a)</h2>
        <p class="subtitulo">Acesse sua lista de compras compartilhada</p>

        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <div class="input-group">
                <div class="input-icon">
                    <i class="fas fa-envelope" aria-hidden="true"></i>
                </div>
                <label for="email" class="visually-hidden">E-mail</label>
                <input type="email" id="email" placeholder="E-mail" autocomplete="email" aria-label="Seu endereço de e-mail" required>
            </div>

            <div class="input-group">
                <div class="input-icon">
                    <i class="fas fa-lock" aria-hidden="true"></i>
                </div>
                <label for="senha" class="visually-hidden">Senha</label>
                <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" aria-label="Sua senha" required>
            </div>

            <div class="forgot-password">
                <a href="#" id="esqueceuSenha" aria-label="Recuperar senha">Esqueceu a senha?</a>
            </div>

            <div id="errorMessage" class="error-message" role="alert" aria-live="polite" hidden>
                <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
                <span>E-mail ou senha inválidos</span>
            </div>

            <div class="botoes">
                <button type="submit" id="btnEntrar" class="btn-primary" aria-label="Entrar no aplicativo">
                    <i class="fas fa-arrow-right-to-bracket" aria-hidden="true"></i>
                    Entrar
                </button>
                <button type="button" id="btnCadastrar" class="btn-secondary" onclick="cadastro()" aria-label="Criar nova conta">
                    <i class="fas fa-user-plus" aria-hidden="true"></i>
                    Criar nova conta
                </button>
            </div>
        </form>

        <p class="footer-note" role="note">Demo: use qualquer e-mail/senha para testar</p>
    </div>

    <div id="liveRegion" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="auth.js"></script>
</body>

</html>
