<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login | Lista Compartilhada</title>
    <link rel="stylesheet" href="src/login.css">
    <!-- FontAwesome 6 (gratuito) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Manifest para PWA (se tiver) -->
    <link rel="manifest" href="manifest.json">
    <!-- Theme color para navegadores mobile -->
    <meta name="theme-color" content="#EA3788">
</head>

<body>
    <div class="container fade-in-up">
        <!-- Ilustração/ícone decorativo -->
        <div class="icon-wrapper">
            <i class="fas fa-basket-shopping"></i>
        </div>

        <h2 class="titulo">Bem-vindo(a)</h2>
        <p class="subtitulo">Acesse sua lista de compras compartilhada</p>

        <!-- Grupo de campo: E-mail -->
        <div class="input-group">
            <div class="input-icon">
                <i class="fas fa-envelope"></i>
            </div>
            <input type="email" id="email" placeholder="E-mail" autocomplete="email">
        </div>

        <!-- Grupo de campo: Senha -->
        <div class="input-group">
            <div class="input-icon">
                <i class="fas fa-lock"></i>
            </div>
            <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
        </div>

        <!-- Link esqueceu a senha (placeholder para UX) -->
        <div class="forgot-password">
            <a href="#" id="esqueceuSenha">Esqueceu a senha?</a>
        </div>

        <!-- Mensagem de erro (invisível por padrão) -->
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>E-mail ou senha inválidos</span>
        </div>

        <div class="botoes">
            <button id="btnEntrar" class="btn-primary">
                <i class="fas fa-arrow-right-to-bracket"></i>
                Entrar
            </button>
            <button id="btnCadastrar" class="btn-secondary">
                <i class="fas fa-user-plus"></i>
                Criar nova conta
            </button>
        </div>

        <p class="footer-note">Demo: use qualquer e-mail/senha para testar</p>
    </div>

    <script type="module" src="auth.js"></script>
</body>

</html>
